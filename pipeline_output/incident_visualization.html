<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incident Visualization</title>
  <style>
    :root {
      --bg: #f4f2ea;
      --paper: #fffdf7;
      --ink: #1f1a14;
      --accent: #b84c2a;
      --line: #d6cab5;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, #f6e3d6 0%, transparent 38%),
        radial-gradient(circle at bottom left, #e9f0d8 0%, transparent 42%),
        var(--bg);
    }
    .wrap { max-width: 1100px; margin: 30px auto; padding: 0 16px; }
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
      padding: 18px;
    }
    h1 { margin: 0 0 8px 0; color: var(--accent); }
    p { margin: 0 0 14px 0; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border: 1px solid var(--line); text-align: left; padding: 10px; font-size: 14px; }
    th { background: #f7efe2; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Network Incident Timeline Overview</h1>
      <p>Generated at 2026-05-19T16:44:53Z</p>
      <table>
        <thead>
          <tr>
            <th>Incident</th><th>Start</th><th>End</th><th>Duration(s)</th>
            <th>Events</th><th>Devices</th><th>Primary Issue</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>INC-0001</td><td>2026-04-03T09:58:04+00:00</td><td>2026-04-03T09:58:06+00:00</td><td>2.0</td><td>3</td><td>CORE-RTR-W1, MONITOR-NODE-01, DNS-EAST-02</td><td>bgp</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
